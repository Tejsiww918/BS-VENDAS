<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Loja Digital Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111;
      box-shadow: 0 0 10px #00f2ff;
    }

    header h1 {
      margin: 0;
      color: #00f2ff;
    }

    .container {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #1f1f2e;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
    }

    .price {
      font-size: 22px;
      color: #00ff88;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #00f2ff;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ff88;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h1>🔥 Loja Digital Pro 🔥</h1>
  <p>Produtos digitais para gamers</p>
</header>

<div class="container">

  <div class="card">
    <h2>Links Diretos VIP</h2>
    <p>TENHA ACESSO A TODOS OS MODS SEM ENCUTADOR</p>
    <div class="price">R$ 2,00</div>
    <a href="https://mpago.la/2rUaxT3" class="btn">Comprar via Pix</a>
  </div>

  

</div>

<footer>
  © 2026 Loja Digital Pro - Todos os direitos reservados
</footer>

</body>
</html>
